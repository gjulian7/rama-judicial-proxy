services:
  - type: web
    name: rama-judicial-proxy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RAMA_PROXY_KEY
        sync: false
      - key: DEFAULT_NOMBRE
        value: SEVEN ELEPHANTS
      - key: DEFAULT_TIPO_PERSONA
        value: jur
      - key: DEFAULT_CODIFICACION_DESPACHO
        value: "05"
